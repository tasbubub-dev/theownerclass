/* ---------- HELPERS ---------- */

const thDate = (ms) => ms == null ? "-" :
  new Date(ms).toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "numeric" });
const thDateTime = (ms) => ms == null ? "-" :
  new Date(ms).toLocaleString("th-TH", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
const hhmm = (ms) => new Date(ms).toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
// รายละเอียดเวลาคลาส เช่น "เสาร์ ที่ 2 ก.ค.2569 เวลา 11.00-16.00 น."
const hhmmDot = (ms) => new Date(ms).toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" }).replace(":", ".");
const classSchedule = (startMs, endMs) => {
  if (startMs == null) return "-";
  const d = new Date(startMs);
  const weekday = d.toLocaleDateString("th-TH", { weekday: "long" }).replace(/^วัน/, "");
  const dayMonth = d.toLocaleDateString("th-TH", { day: "numeric", month: "short" });
  const beYear = d.getFullYear() + 543;
  const range = endMs == null ? hhmmDot(startMs) : `${hhmmDot(startMs)}-${hhmmDot(endMs)}`;
  return `${weekday} ที่ ${dayMonth}${beYear} เวลา ${range} น.`;
};

const pad2 = (n) => String(n).padStart(2, "0");
const toLocalInput = (ms) => {
  const d = new Date(ms);
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
};

// item 3 — สีตามวันคงเหลือ
function MembershipBadge({ membership, plain }) {
  if (membership.type === "One" && membership.active)
    return <Badge plain={plain} cls="bg-sky-50 text-sky-700" icon={Ticket} text="บัตร One · จองได้อีก 1 ครั้ง" />;
  if (membership.pending)
    return <Badge plain={plain} cls="bg-slate-100 text-slate-600" icon={Loader2} spin text="รออนุมัติสลิป" />;
  if (membership.type === "Member") {
    const dl = membership.daysLeft;
    const expired = !membership.active;
    let cls = "bg-emerald-50 text-emerald-700";      // > 7 วัน = เขียว
    if (expired || dl <= 0) cls = "bg-rose-50 text-rose-600";   // หมดอายุ = แดง
    else if (dl <= 7) cls = "bg-amber-50 text-amber-700";        // ใกล้หมด = เหลือง

  }
  return <Badge plain={plain} cls="bg-rose-50 text-rose-600" icon={AlertTriangle} text="ไม่มีบัตร" />;
}

}

// สรุปจำนวนสมาชิก: ทั้งหมด / ยังไม่หมดอายุ / หมดอายุแล้ว (ใช้ในหน้า Member และ Member Admin)
function MemberStats({ users, payments }) {
  const stats = useMemo(() => {
    let active = 0;
    users.forEach((u) => {
      const lp = payments.filter((p) => p.uid === u.uid && p.status === "Approved" && p.passName === "Member")
        .sort((a, b) => (b.expired_date || 0) - (a.expired_date || 0))[0];
      if (lp?.expired_date && lp.expired_date > NOW) active++;
    });
    return { total: users.length, active, expired: users.length - active };
  }, [users, payments]);
  return (
    <div className="grid grid-cols-3 gap-2 mb-2">
      <div className="bg-white rounded-xl py-2.5 text-center shadow-lg shadow-black/15 border border-slate-100">
        <div className="text-lg font-bold text-slate-800">{stats.total}</div>
        <div className="text-[10px] text-slate-400">ทั้งหมด</div>
      </div>
      <div className="bg-white rounded-xl py-2.5 text-center shadow-lg shadow-black/15 border border-slate-100">
        <div className="text-lg font-bold text-emerald-600">{stats.active}</div>
        <div className="text-[10px] text-slate-400">ยังไม่หมดอายุ</div>
      </div>
      <div className="bg-white rounded-xl py-2.5 text-center shadow-lg shadow-black/15 border border-slate-100">
        <div className="text-lg font-bold text-rose-500">{stats.expired}</div>
        <div className="text-[10px] text-slate-400">หมดอายุ/ไม่มีบัตร</div>
      </div>
    </div>
  );
}

// คลิกรูปไหนในแอปก็ได้ (ยกเว้นรูปที่ใช้กดอัปโหลดไฟล์ ซึ่งอยู่ใน <label>) เพื่อดูภาพขยาย
function Lightbox() {
  const [src, setSrc] = useState(null);
  useEffect(() => {
    const handler = (e) => {
      const img = e.target.closest("img");
      if (!img || !img.src || img.closest("label")) return;
      setSrc(img.src);
    };
    document.addEventListener("click", handler);
    return () => document.removeEventListener("click", handler);
  }, []);
  if (!src) return null;
  return (
    <div className="fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4" onClick={() => setSrc(null)}>
      <button onClick={() => setSrc(null)} className="absolute top-4 right-4 w-11 h-11 grid place-items-center rounded-full bg-white/10 text-white">
        <X size={22} />
      </button>
      <img src={src} alt="" className="max-w-full max-h-full object-contain rounded-lg" onClick={(e) => e.stopPropagation()} />
    </div>
  );
}

// เปิดกล้องจริงแล้วถอดรหัส QR แบบสด ๆ ด้วย jsQR (แทนการจำลองสแกน)
function ScanCamera({ onDetect, onClose }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const [error, setError] = useState("");

  useEffect(() => {
    let stream = null;
    let raf = null;
    let stopped = false;

    const tick = () => {
      if (stopped) return;
      const video = videoRef.current;
      const canvas = canvasRef.current;
      if (video && canvas && video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR && window.jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          stopped = true;
          onDetect(code.data);
          return;
        }
      }
      raf = requestAnimationFrame(tick);
    };

    navigator.mediaDevices?.getUserMedia({ video: { facingMode: "environment" } })
      .then((s) => {
        if (stopped) { s.getTracks().forEach((t) => t.stop()); return; }
        stream = s;
        if (videoRef.current) {
          videoRef.current.srcObject = s;
          videoRef.current.play();
        }
        raf = requestAnimationFrame(tick);
      })
      .catch(() => setError("เปิดกล้องไม่สำเร็จ — กรุณาอนุญาตการใช้กล้องแล้วลองใหม่"));

    return () => {
      stopped = true;
      if (raf) cancelAnimationFrame(raf);
      if (stream) stream.getTracks().forEach((t) => t.stop());
    };
  }, [onDetect]);

  return (
    <div className="fixed inset-0 z-50 bg-black flex flex-col">
      <div className="flex items-center justify-between p-4">
        <span className="text-white text-sm font-medium">สแกน QR เพื่อเช็คอิน</span>
        <button onClick={onClose} className="w-11 h-11 grid place-items-center rounded-full bg-white/10">
          <X size={20} className="text-white" />
        </button>
      </div>
      <div className="flex-1 relative overflow-hidden">
        <video ref={videoRef} playsInline muted className="absolute inset-0 w-full h-full object-cover" />
        <div className="absolute inset-0 grid place-items-center">
          <div className="w-56 h-56 border-2 border-orange-400 rounded-2xl" />
        </div>
        {error && (
          <div className="absolute inset-x-4 top-4 bg-rose-600 text-white text-xs rounded-xl px-3 py-2 text-center">{error}</div>
        )}
        <div className="absolute bottom-6 inset-x-4 text-center text-white/70 text-xs">เล็ง QR ให้อยู่ในกรอบ ระบบจะเช็คอินให้อัตโนมัติ</div>
      </div>
      <canvas ref={canvasRef} className="hidden" />
    </div>
  );
}

// แปลง users doc ดิบจาก Firestore → shape ที่ UI ใช้ (code = รหัสสมาชิกที่โชว์จริง, uid = Firebase Auth uid สำหรับ match ข้อมูล)
function mapUserDoc(raw) {
  return {
    uid: raw.id,
    code: (raw.line || "").trim(),
    display_name: raw.display_name || "",
    email: raw.email || "",
    phone_number: raw.phone_number || "",
    photo_url: raw.photo_url || "",
    role: (raw.role || "guest").toLowerCase(),
    memberStatus: raw.memberStatus || "Guest",
    age: raw.age,
    memberExpire: tsToMs(raw.memberExpire),
    memberStart: tsToMs(raw.memberStart),
    uplineList: raw.uplineList || "",
  };
}

function App() {
  const [fbUser, setFbUser] = useState(undefined);   // undefined = กำลังเช็ค, null = ยังไม่ login, object = login แล้ว
  const [myProfileRaw, setMyProfileRaw] = useState(null);
  const [usersRaw, setUsersRaw] = useState([]);
  const [passesList, setPassesList] = useState([]);
  const [paymentsRaw, setPaymentsRaw] = useState([]);
  const [classesRaw, setClassesRaw] = useState([]);
  const [sessionsRaw, setSessionsRaw] = useState([]);
  const [bookingsRaw, setBookingsRaw] = useState([]);

  const [view, setView] = useState("home");
  const [drawer, setDrawer] = useState(false);
  const [adminExpand, setAdminExpand] = useState(false);
  const [toast, setToast] = useState(null);
  const [rejecting, setRejecting] = useState(null);
  const [rejectNote, setRejectNote] = useState("");
  const [bookSel, setBookSel] = useState(null);           // item 4: single-select session
  const [attnDetail, setAttnDetail] = useState(null);     // item 5: {classId, session, kind}
  const [scanOpen, setScanOpen] = useState(false);        // item 6 — เปิดกล้องสแกน QR จริง
  const [courseEdit, setCourseEdit] = useState(null);     // 'new' | classId | null
  const [slipPreview, setSlipPreview] = useState(null);   // download URL ของสลิปที่อัปโหลดขึ้น Storage แล้ว
  const [slipUploading, setSlipUploading] = useState(false);

  // ---- Firebase Auth state ----
  useEffect(() => {
    const unsub = auth.onAuthStateChanged((u) => setFbUser(u));
    return unsub;
  }, []);

  // ---- โปรไฟล์ของตัวเอง (users/{uid}) — อ่านแยกจาก collection เต็ม เพราะ rule มักอนุญาตให้อ่านเอกสารตัวเองได้แน่นอนกว่า ----
  useEffect(() => {
    if (!fbUser) { setMyProfileRaw(null); return; }
    const unsub = db.collection("users").doc(fbUser.uid).onSnapshot(
      (doc) => setMyProfileRaw(doc.exists ? { id: doc.id, ...doc.data() } : null),
      (err) => console.error("users/me", err)
    );
    return unsub;
  }, [fbUser]);

  // ---- users ทั้งหมด (สำหรับหน้า Member / Member Admin — ต้องเป็น role ที่มีสิทธิ์อ่านตาม Firestore rules) ----
  useEffect(() => {
    if (!fbUser) { setUsersRaw([]); return; }
    const unsub = db.collection("users").onSnapshot(
      (snap) => setUsersRaw(snap.docs.map((d) => ({ id: d.id, ...d.data() }))),
      (err) => console.error("users", err)
    );
    return unsub;
  }, [fbUser]);

  // ---- pass (ราคาบัตร) ----
  useEffect(() => {
    if (!fbUser) { setPassesList([]); return; }
    const unsub = db.collection("pass").onSnapshot(
      (snap) => setPassesList(snap.docs.map((d) => ({ id: d.id, ...d.data() }))),
      (err) => console.error("pass", err)
    );
    return unsub;
  }, [fbUser]);

  // ---- payments ----
  useEffect(() => {
    if (!fbUser) { setPaymentsRaw([]); return; }
    const unsub = db.collection("payments").onSnapshot(
      (snap) => setPaymentsRaw(snap.docs.map((d) => ({ id: d.id, ...d.data() }))),
      (err) => console.error("payments", err)
    );
    return unsub;
  }, [fbUser]);

  // ---- classes + sessions ----
  useEffect(() => {
    if (!fbUser) { setClassesRaw([]); setSessionsRaw([]); return; }
    const unsub1 = db.collection("classes").onSnapshot(
      (snap) => setClassesRaw(snap.docs.map((d) => ({ id: d.id, ...d.data() }))),
      (err) => console.error("classes", err)
    );
    const unsub2 = db.collection("sessions").onSnapshot(
      (snap) => setSessionsRaw(snap.docs.map((d) => ({ id: d.id, ...d.data() }))),
      (err) => console.error("sessions", err)
    );
    return () => { unsub1(); unsub2(); };
  }, [fbUser]);

  // ---- bookings ----
  useEffect(() => {
    if (!fbUser) { setBookingsRaw([]); return; }
    const unsub = db.collection("bookings").onSnapshot(
      (snap) => setBookingsRaw(snap.docs.map((d) => ({ id: d.id, ...d.data() }))),
      (err) => console.error("bookings", err)
    );
    return unsub;
  }, [fbUser]);

  // ---- แปลงข้อมูลดิบ → shape ที่ UI ใช้ ----
  const user = useMemo(() => (myProfileRaw ? mapUserDoc(myProfileRaw) : null), [myProfileRaw]);
  const users = useMemo(() => usersRaw.map(mapUserDoc), [usersRaw]);

  const PASSES = useMemo(() => Object.fromEntries(passesList.map((p) => [p.name, {
    id: p.id, name: p.name, price: p.price, duration_days: p.duration_days,
    pass_description: p.pass_description, pass_image: p.pass_image, active: p.Is_active,
  }])), [passesList]);
  const passesById = useMemo(() => Object.fromEntries(passesList.map((p) => [p.id, p])), [passesList]);

  const sessionsById = useMemo(() => Object.fromEntries(sessionsRaw.map((s) => [s.id, s])), [sessionsRaw]);

  const classes = useMemo(() => classesRaw.map((c) => {
    const mine = sessionsRaw.filter((s) => s.class_ref?.id === c.id);
    const on = mine.find((s) => s.classType === "Onsite");
    const off = mine.find((s) => s.classType === "Online");
    return {
      id: c.id, className: c.className, description: c.description, instructorName: c.instructorName,
      location: c.location, meeting_url: c.meeting_url, class_url: c.class_url,
      active: c.active, is_free_booking: c.is_free_booking,
      startTime: tsToMs(c.startTime), endTime: tsToMs(c.endTime),
      sessions: {
        Onsite: { capacity: on?.capacity ?? 0, booked: on?.booked ?? 0, sessionId: on?.id ?? null },
        Online: { capacity: off?.capacity ?? 0, booked: off?.booked ?? 0, sessionId: off?.id ?? null },
      },
    };
  }), [classesRaw, sessionsRaw]);

  const payments = useMemo(() => paymentsRaw.map((p) => ({
    id: p.id,
    uid: p.uid || p.user_ref?.id,
    passName: passesById[p.pass_ref?.id]?.name,
    status: p.status,
    createdAt: tsToMs(p.createdAt),
    approved_at: tsToMs(p.approved_at),
    approved_by: p.approved_by,
    expired_date: tsToMs(p.expired_date),
    used: p.used ?? false,
    slip_url: p.slip_url,
    rejected_note: p.rejected_note ?? null,
  })), [paymentsRaw, passesById]);

  const bookings = useMemo(() => bookingsRaw.map((b) => {
    const sess = sessionsById[b.session_ref?.id];
    return {
      id: b.id,
      uid: b.users_ref?.id,
      classId: b.classes_ref?.id,
      sessionId: b.session_ref?.id,
      sessionType: sess?.classType,
      paymentId: b.payments_ref?.id,
      createdAt: tsToMs(b.createdAt),
      bookingStatus: b.statusBooking,
      checkedInAt: tsToMs(b.checkedin_at),
      checkedInBy: b.checkedin_by,
      checkinVia: sess?.classType === "Online" ? "zoom" : "scan",
    };
  }), [bookingsRaw, sessionsById]);

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2200); };
  const go = (v) => { setView(v); setDrawer(false); setBookSel(null); setAttnDetail(null); setCourseEdit(null); setSlipPreview(null); };
  const handleSlipFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file || !user) return;
    setSlipUploading(true);
    try {
      const url = await uploadFile(file, `users/${user.uid}/uploads/${Date.now()}_${file.name}`);
      setSlipPreview(url);
    } catch (err) {
      showToast("อัปโหลดสลิปไม่สำเร็จ");
    }
    setSlipUploading(false);
  };

  const membership = useMemo(() => {
    if (!user) return { active: false };
    const mine = payments.filter((p) => p.uid === user.uid)
      .sort((a, b) => (b.approved_at || b.createdAt) - (a.approved_at || a.createdAt));
    const latest = mine[0];
    if (!latest) return { active: false, pending: false };
    if (latest.status === "Pending") return { active: false, pending: true, type: latest.passName, payment: latest };
    if (latest.status === "Approved") {
      if (latest.passName === "One")
        return { active: !latest.used, type: "One", payment: latest, expired_date: null, daysLeft: null };
      const active = latest.expired_date > NOW;
      return { active, type: "Member", payment: latest, expired_date: latest.expired_date,
        daysLeft: Math.max(0, Math.ceil((latest.expired_date - NOW) / D)) };
    }
    return { active: false };
  }, [user, payments]);

  const canBook = membership.active || membership.pending;

  if (fbUser === undefined) return <div className="min-h-screen grid place-items-center text-slate-400 text-sm">กำลังโหลด…</div>;
  if (!fbUser) return <Login />;
  if (!user) return <div className="min-h-screen grid place-items-center text-slate-400 text-sm">กำลังโหลดข้อมูลผู้ใช้…</div>;

  const nearest = classes.filter((c) => c.active && c.endTime > NOW).sort((a, b) => a.startTime - b.startTime)[0];

  // item 1 — booking ล่าสุดของ user (ใกล้ถึงที่สุด, ถ้าไม่มีในอนาคตเอาอันล่าสุดสุด)
  const myBookings = bookings.filter((b) => b.uid === user.uid)
    .map((b) => ({ ...b, cls: classes.find((c) => c.id === b.classId) }));
  const upcomingMine = myBookings.filter((b) => b.cls && b.cls.endTime > NOW).sort((a, b) => a.cls.startTime - b.cls.startTime);
  const latestBooking = upcomingMine[0] || myBookings.sort((a, b) => (b.cls?.startTime || 0) - (a.cls?.startTime || 0))[0];

  /* ---- ACTIONS (เขียนขึ้น Firestore จริง) ---- */
  const buyPass = async (passName) => {
    const pass = PASSES[passName];
    if (!pass) return;
    await db.collection("payments").add({
      uid: user.uid,
      user_ref: db.doc(`users/${user.uid}`),
      pass_ref: db.doc(`pass/${pass.id}`),
      status: "Pending",
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      approved_at: null, approved_by: null, expired_date: null,
      slip_url: slipPreview || null, rejected_note: null,
    });
    showToast(`ส่งสลิปบัตร ${passName} แล้ว · รออนุมัติ`);
    go("payments");
  };
  const approvePayment = async (payId) => {
    const p = payments.find((x) => x.id === payId);
    if (!p) return;
    const pass = PASSES[p.passName];
    const expired_date = pass?.duration_days > 0 ? Date.now() + pass.duration_days * D : null;
    await db.collection("payments").doc(payId).update({
      status: "Approved",
      approved_at: firebase.firestore.FieldValue.serverTimestamp(),
      approved_by: user.uid,
      expired_date: expired_date ? firebase.firestore.Timestamp.fromMillis(expired_date) : null,
    });
    await db.collection("users").doc(p.uid).update({ memberStatus: "Member" });
    showToast("อนุมัติสลิปแล้ว");
  };
  const confirmReject = async () => {
    await db.collection("payments").doc(rejecting).update({
      status: "Rejected", rejected_note: rejectNote.trim() || "ไม่ระบุเหตุผล",
    });
    setRejecting(null); setRejectNote("");
    showToast("ปฏิเสธสลิปแล้ว");
  };
  const bookClass = async (cls, sessionType) => {
    if (!canBook) { go("payments"); return; }
    const sessionId = cls.sessions[sessionType].sessionId;
    if (!sessionId) { showToast("ไม่พบ session นี้ในระบบ"); return; }
    await db.collection("bookings").add({
      classes_ref: db.doc(`classes/${cls.id}`),
      session_ref: db.doc(`sessions/${sessionId}`),
      users_ref: db.doc(`users/${user.uid}`),
      payments_ref: membership.payment ? db.doc(`payments/${membership.payment.id}`) : null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      statusBooking: membership.active ? "Approved" : "Pending",
    });
    await db.collection("sessions").doc(sessionId).update({
      booked: firebase.firestore.FieldValue.increment(1),
    });
    if (membership.type === "One" && membership.payment)
      await db.collection("payments").doc(membership.payment.id).update({ used: true });
    showToast(`จองคลาส (${sessionType}) สำเร็จ`);
    go("mybookings");
  };
  const checkIn = async (bookingId) => {
    await db.collection("bookings").doc(bookingId).update({
      statusBooking: "Used",
      checkedin_at: firebase.firestore.FieldValue.serverTimestamp(),
      checkedin_by: user.uid,
    });
  };
  // สถานะที่แสดงจริง: เช็คอินแล้ว > (หมดเวลาเฉพาะเมื่อคลาสจบ) > อนุมัติแล้ว=พร้อมเข้าเรียน > รออนุมัติ
  const effStatus = (b) => {
    if (b.bookingStatus === "Used") return "Used";
    const cls = classes.find((c) => c.id === b.classId);
    if (cls && cls.endTime < NOW) return "Expired";
    const pay = payments.find((p) => p.id === b.paymentId);
    if (pay?.status === "Approved" || b.bookingStatus === "Approved") return "Approved";
    return "Pending";
  };
  const saveClass = async (data, id) => {
    const payload = {
      className: data.className, instructorName: data.instructorName, description: data.description,
      active: data.active, is_free_booking: data.isFree,
      location: data.location, meeting_url: data.meeting_url,
      startTime: firebase.firestore.Timestamp.fromMillis(data.startTime),
      endTime: firebase.firestore.Timestamp.fromMillis(data.endTime),
    };
    if (data.class_url) payload.class_url = data.class_url;
    let classId = id;
    if (id) {
      await db.collection("classes").doc(id).update(payload);
    } else {
      const ref = await db.collection("classes").add(payload);
      classId = ref.id;
    }
    for (const [classType, capacity] of [["Onsite", data.capOnsite], ["Online", data.capOnline]]) {
      const existing = sessionsRaw.find((s) => s.class_ref?.id === classId && s.classType === classType);
      if (existing) {
        await db.collection("sessions").doc(existing.id).update({ capacity });
      } else {
        await db.collection("sessions").add({ class_ref: db.doc(`classes/${classId}`), classType, capacity, booked: 0 });
      }
    }
    showToast(id ? "บันทึกการแก้ไขคลาสแล้ว" : "เพิ่มคลาสใหม่แล้ว");
    setCourseEdit(null);
  };
  // item 6 — ถอดรหัส QR จริงจากกล้อง: ข้อมูลใน QR คือ booking id → หา booking แล้วเช็คอิน
  const handleScanDetect = async (text) => {
    setScanOpen(false);
    const target = bookings.find((b) => b.id === text.trim());
    if (!target || effStatus(target) !== "Approved") { showToast("QR นี้ไม่ใช่ QR ที่พร้อมเช็คอิน"); return; }
    await checkIn(target.id);
    const u = users.find((x) => x.uid === target.uid);
    showToast(`สแกนสำเร็จ · เช็คอิน ${u?.display_name}`);
  };

  const drawerProps = { drawer, setDrawer, user, view, go, canBook, adminExpand, setAdminExpand };

  const page = (() => {

  /* ===== HOME ===== */
  if (view === "home") {
    return (
      <Shell>
        <ProfileStrip user={user} membership={membership} onMenu={() => setDrawer(true)} />
        <div className="p-4 space-y-4">
          {!nearest ? (
            <Empty icon={CalendarCheck} text="ยังไม่มีคลาสที่กำลังจะมาถึง" />
          ) : (
            <>
              <div className="text-xs font-medium text-slate-400 px-1">คลาสที่กำลังจะมาถึง</div>
              <div className="bg-white rounded-2xl overflow-hidden shadow-lg shadow-black/15 border border-slate-100">
                <div className="relative">
                  <img src={nearest.class_url} alt="" className="w-full aspect-[3/4] object-cover" />
                  <div className="absolute top-3 left-3 bg-black/60 text-white text-xs px-2.5 py-1 rounded-full flex items-center gap-1">
                    <Clock size={12} /> {thDateTime(nearest.startTime)}
                  </div>
                </div>
                <div className="p-4 space-y-3">
                  <h2 className="text-lg font-semibold text-slate-800">{nearest.className}</h2>
                  <p className="text-sm text-slate-500 leading-relaxed">{nearest.description}</p>
                  <InfoLine icon={CircleUserRound} text={`ผู้สอน: ${nearest.instructorName}`} />
                  <InfoLine icon={Clock} text={classSchedule(nearest.startTime, nearest.endTime)} />
                  <InfoLine icon={MapPin} text={nearest.location} />
                  <button onClick={() => {
                      if (!canBook) return go("payments");
                      const already = bookings.some((b) => b.uid === user.uid && b.classId === nearest.id);
                      go(already ? "mybookings" : "book");
                    }}
                    className="mt-1 w-full text-white text-base font-semibold py-4 rounded-xl flex items-center justify-center gap-1.5 active:scale-[.98] transition"
                    style={{ background: BRAND, boxShadow: "0 10px 24px -8px rgba(0,0,0,.35)" }}>
                    {!canBook ? "ซื้อบัตรก่อนจอง"
                      : bookings.some((b) => b.uid === user.uid && b.classId === nearest.id)
                        ? <>ดู QR / ลิงก์ Zoom <ArrowRight size={16} /></>
                        : <>จองคลาสนี้ <ArrowRight size={16} /></>}
                  </button>
                </div>
              </div>
              <p className="text-[11px] text-slate-400 text-center">
                แสดงคลาสที่ใกล้ถึงที่สุด 1 รายการ · จะเปลี่ยนเป็นคลาสถัดไปเมื่อคลาสนี้จบ
              </p>
            </>
          )}
        </div>
      </Shell>
    );
  }

  /* ===== PAYMENTS history ===== */
  if (view === "payments") {
    const mine = payments.filter((p) => p.uid === user.uid).sort((a, b) => b.createdAt - a.createdAt);
    return (
      <Shell>
        <TopBar title="สมัครสมาชิก / ซื้อบัตร" onBack={() => go("home")} />
        <div className="p-4 space-y-4">
          {!membership.active ? (
            <button onClick={() => go("buypass")}
              className="w-full text-white text-base font-semibold py-4 rounded-xl flex items-center justify-center gap-1.5 active:scale-[.98] transition" style={{ background: BRAND, boxShadow: "0 10px 24px -8px rgba(0,0,0,.35)" }}>
              <DollarSign size={18} /> ซื้อบัตรใหม่
            </button>
          ) : (
            <div className="bg-emerald-50 text-emerald-700 text-sm rounded-xl px-4 py-3 flex items-center gap-2">
              <CheckCircle2 size={16} /> มีบัตรใช้งานอยู่ · ซื้อใหม่ได้เมื่อบัตรหมดอายุ
            </div>
          )}
          <div className="text-xs font-medium text-slate-400 px-1">ประวัติการซื้อบัตร</div>
          {mine.length === 0 && <Empty icon={DollarSign} text="ยังไม่มีประวัติการซื้อบัตร" />}
          {mine.map((p) => {
            const st = PAY_STATUS_STYLE[paymentDisplayStatus(p)];
            return (
              <div key={p.id} className="bg-white rounded-2xl p-4 shadow-lg shadow-black/15 border border-slate-100">
                <div className="flex justify-between items-start">
                  <div>
                    <div className="flex items-center gap-2">
                      <span className="font-semibold text-slate-800">บัตร {p.passName}</span>
                      <span className="text-xs text-slate-400">{PASSES[p.passName].price}฿</span>
                    </div>
                    <div className="text-xs text-slate-400 mt-0.5">ซื้อเมื่อ {thDateTime(p.createdAt)}</div>
                    {p.expired_date && <div className="text-xs text-slate-400">หมดอายุ {thDate(p.expired_date)}</div>}
                  </div>
                  <span className={`text-xs px-2.5 py-1 rounded-full ${st.cls}`}>{st.label}</span>
                </div>
                {p.status === "Rejected" && p.rejected_note && (
                  <div className="mt-2 text-xs bg-rose-50 text-rose-600 rounded-lg px-3 py-2">เหตุผล: {p.rejected_note}</div>
                )}
                {p.slip_url && (p.slip_url.startsWith("http") || p.slip_url.startsWith("data:")) && (
                  <div className="mt-2">
                    <img src={p.slip_url} alt="slip" className="w-20 h-20 object-cover rounded-lg" />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Shell>
    );
  }

  /* ===== BUY PASS ===== */
  if (view === "buypass")
    return (
      <Shell>
        <TopBar title="ซื้อบัตรเรียน" onBack={() => go("payments")} />
        <div className="p-4 space-y-3">
          {Object.values(PASSES).map((p) => (
            <div key={p.name} className="bg-white rounded-2xl shadow-lg shadow-black/15 border border-slate-100 p-3 flex gap-3">
              <img src={p.pass_image} alt={p.name} className="w-14 h-14 rounded-xl object-cover shrink-0" />
              <div className="flex-1 min-w-0">
                <div className="flex items-start justify-between gap-2">
                  <div className="min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-semibold text-slate-800 text-sm">{p.name}</span>
                      {p.duration_days > 0
                        ? <span className="text-[10px] bg-orange-50 text-orange-600 px-2 py-0.5 rounded-full">{p.duration_days} วัน</span>
                        : <span className="text-[10px] bg-sky-50 text-sky-600 px-2 py-0.5 rounded-full">จอง 1 ครั้ง</span>}
                    </div>
                    <p className="text-xs text-slate-500 mt-0.5 leading-snug line-clamp-2">{p.pass_description}</p>
                  </div>
                  <div className="text-right shrink-0">
                    <div className="text-lg font-bold" style={{ color: BRAND }}>{p.price}</div>
                    <div className="text-[10px] text-slate-400">บาท</div>
                  </div>
                </div>
                <button onClick={() => go("pay:" + p.name)} disabled={membership.active}
                  className="mt-2 w-full text-white text-xs font-medium py-2 rounded-lg flex items-center justify-center gap-1.5 disabled:opacity-50"
                  style={{ background: BRAND }}>
                  {membership.active ? "มีบัตรอยู่แล้ว" : <>เลือกบัตรนี้ <ArrowRight size={14} /></>}
                </button>
              </div>
            </div>
          ))}
        </div>
      </Shell>
    );

  /* ===== PAY ===== */
  if (view.startsWith("pay:")) {
    const passName = view.split(":")[1];
    const p = PASSES[passName];
    return (
      <Shell>
        <TopBar title={`ชำระเงิน · ${p.name}`} onBack={() => go("buypass")} />
        <div className="p-4 space-y-4">
          <div className="bg-white rounded-2xl p-4 shadow-lg shadow-black/15 border border-slate-100 text-center">
            <div className="text-xs text-slate-400 mb-2">สแกนเพื่อชำระ {p.price} บาท</div>
            <img src={ACCOUNT.qrcode_payment} alt="qr" className="w-36 h-36 mx-auto rounded-xl" />
            <div className="mt-3 text-sm text-slate-700 font-medium">{ACCOUNT.bank_name}</div>
            <div className="text-sm text-slate-500">{ACCOUNT.account_number}</div>
            <div className="text-xs text-slate-400">{ACCOUNT.account_owner}</div>
          </div>
          <div className="bg-white rounded-2xl p-4 shadow-lg shadow-black/15 border border-slate-100">
            <label className="block cursor-pointer">
              <input type="file" accept="image/*" className="hidden" onChange={handleSlipFile} />
              {slipUploading ? (
                <div className="border-2 border-dashed border-slate-200 rounded-xl py-8 grid place-items-center text-slate-400">
                  <Loader2 size={26} className="animate-spin" /><span className="text-xs mt-1">กำลังอัปโหลด…</span>
                </div>
              ) : slipPreview ? (
                <div className="relative rounded-xl overflow-hidden">
                  <img src={slipPreview} alt="สลิปที่อัปโหลด" className="w-full aspect-[3/4] object-cover rounded-xl" />
                  <div className="absolute bottom-2 inset-x-2 bg-black/60 text-white text-[11px] text-center py-1.5 rounded-lg">แตะเพื่อเปลี่ยนรูป</div>
                </div>
              ) : (
                <div className="border-2 border-dashed border-slate-200 rounded-xl py-8 grid place-items-center text-slate-400">
                  <Upload size={26} /><span className="text-xs mt-1">แตะเพื่อแนบสลิปการโอน</span>
                </div>
              )}
            </label>
          </div>
          <button onClick={() => buyPass(passName)} className="w-full text-white text-base font-semibold py-4 rounded-xl active:scale-[.98] transition" style={{ background: BRAND, boxShadow: "0 10px 24px -8px rgba(0,0,0,.35)" }}>
            ส่งสลิป · รออนุมัติ
          </button>
        </div>
      </Shell>
    );
  }

  /* ===== BOOK — item 4: เลือก session อันเดียว, ตัวเลขแถวเดียว ===== */
  if (view === "book") {
    if (!nearest) return <Shell><TopBar title="จองคลาสเรียน" onBack={() => go("home")} /><Empty icon={CalendarCheck} text="ไม่มีคลาสที่กำลังจะมาถึง" /></Shell>;
    const myBk = bookings.find((b) => b.uid === user.uid && b.classId === nearest.id);
    const canPick = (s) => nearest.sessions[s].capacity > 0 && nearest.sessions[s].booked < nearest.sessions[s].capacity;
    return (
      <Shell>
        <TopBar title="จองคลาสเรียน" onBack={() => go("home")} />
        <div className="p-4 space-y-4">
          {membership.pending && (
            <div className="bg-amber-50 text-amber-700 text-xs rounded-xl px-3 py-2 flex items-center gap-2">
              <Loader2 size={14} className="animate-spin" /> บัตรกำลังรออนุมัติ — จองได้ แต่ดู QR/Zoom ได้เมื่ออนุมัติแล้ว
            </div>
          )}
          <div className="bg-white rounded-2xl overflow-hidden shadow-lg shadow-black/15 border border-slate-100">
            <img src={nearest.class_url} alt="" className="w-full aspect-[3/4] object-cover" />
            <div className="p-4 space-y-2">
              <h2 className="text-lg font-semibold text-slate-800">{nearest.className}</h2>
              <InfoLine icon={Clock} text={classSchedule(nearest.startTime, nearest.endTime)} />
              <InfoLine icon={CircleUserRound} text={`ผู้สอน: ${nearest.instructorName}`} />
            </div>
          </div>

          {myBk ? (
            <div className="bg-emerald-50 rounded-2xl p-4 text-center space-y-3">
              <div className="text-emerald-700 text-sm flex items-center justify-center gap-2">
                <CheckCircle2 size={18} /> คุณจองคลาสนี้แล้ว ({myBk.sessionType})
              </div>
              <button onClick={() => go("mybookings")} className="w-full text-white text-sm font-medium py-2.5 rounded-xl bg-emerald-600 flex items-center justify-center gap-1.5">
                <QrCode size={16} /> ดู QR / ลิงก์ Zoom
              </button>
            </div>
          ) : (
            <>
              <div className="text-xs font-medium text-slate-400 px-1">เลือกรูปแบบการเรียน (เลือกได้อย่างเดียว)</div>
              <div className="grid grid-cols-2 gap-2.5">
                {["Onsite", "Online"].map((s) => {
                  const ok = canPick(s);
                  const selected = bookSel === s;
                  return (
                    <button key={s} disabled={!ok} onClick={() => setBookSel(s)}
                      className={`rounded-2xl p-4 border text-left transition disabled:opacity-40
                        ${selected ? "border-transparent ring-2" : "bg-white border-slate-100"}`}
                      style={selected ? { background: s === "Onsite" ? "#fff4ea" : "#eff6ff", boxShadow: `0 0 0 2px ${s === "Onsite" ? BRAND : "#0284c7"}` } : {}}>
                      <div className="flex items-center justify-between">
                        {s === "Onsite" ? <MapPin size={18} className="text-orange-500" /> : <Video size={18} className="text-sky-500" />}
                        {selected ? <CheckCircle size={18} style={{ color: s === "Onsite" ? BRAND : "#0284c7" }} /> : <Circle size={18} className="text-slate-300" />}
                      </div>
                      <div className="text-sm font-medium text-slate-800 mt-2">{s}</div>
                      {nearest.sessions[s].capacity === 0 ? (
                        <div className="text-xs text-slate-400">ไม่เปิด session นี้</div>
                      ) : (
                        <>
                          <div className="flex items-center justify-between text-xs mt-1">
                            <span className={nearest.sessions[s].booked >= nearest.sessions[s].capacity ? "text-rose-500 font-medium" : "text-slate-500"}>
                              {nearest.sessions[s].booked}/{nearest.sessions[s].capacity} ที่นั่ง
                            </span>
                            <span className={ok ? "text-emerald-600" : "text-rose-500"}>
                              {ok ? "ว่าง" : "เต็ม"}
                            </span>
                          </div>
                          <div className="mt-1.5 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full rounded-full transition-all"
                              style={{
                                width: `${Math.min(100, (nearest.sessions[s].booked / nearest.sessions[s].capacity) * 100)}%`,
                                background: nearest.sessions[s].booked >= nearest.sessions[s].capacity ? "#f43f5e" : s === "Onsite" ? BRAND : "#0284c7"
                              }} />
                          </div>
                        </>
                      )}
                    </button>
                  );
                })}
              </div>
              <button disabled={!bookSel} onClick={() => bookClass(nearest, bookSel)}
                className="w-full text-white text-base font-semibold py-4 rounded-xl disabled:opacity-50 active:scale-[.98] transition" style={{ background: BRAND, boxShadow: bookSel ? "0 10px 24px -8px rgba(0,0,0,.35)" : "none" }}>
                {bookSel ? `ยืนยันจอง ${bookSel}` : "เลือกรูปแบบก่อน"}
              </button>
            </>
          )}
        </div>
      </Shell>
    );
  }

  /* ===== MY BOOKINGS — item 1 & 7: คลาสล่าสุดอันเดียว + QR/Zoom ===== */
  if (view === "mybookings") {
    const b = latestBooking;
    if (!b) return <Shell><TopBar title="คิวอาร์โค้ด / ลิงก์ Zoom" onBack={() => go("home")} /><Empty icon={QrCode} text="ยังไม่มีการจองคลาส" /></Shell>;
    const cls = b.cls;
    const es = effStatus(b);
    const zoomOpen = cls && cls.startTime - NOW <= 2 * H;
    const isOnline = b.sessionType === "Online";
    return (
      <Shell>
        <TopBar title="คิวอาร์โค้ด / ลิงก์ Zoom" onBack={() => go("home")} />
        <div className="p-4 space-y-4">
          <div className="bg-white rounded-2xl overflow-hidden shadow-lg shadow-black/15 border border-slate-100">
            <img src={cls?.class_url} alt="" className="w-full aspect-[3/4] object-cover" />
            <div className="p-4">
              <h2 className="font-semibold text-slate-800">{cls?.className}</h2>
              <div className="text-xs text-slate-400 mt-0.5">{classSchedule(cls?.startTime, cls?.endTime)} · {b.sessionType}</div>
              <span className={`inline-block mt-2 text-[11px] px-2 py-0.5 rounded-full ${BOOK_STATUS_STYLE[es].cls}`}>
                {BOOK_STATUS_STYLE[es].label}
              </span>
            </div>
          </div>

          {es === "Pending" ? (
            <div className="bg-slate-100 rounded-2xl p-6 text-center text-slate-500">
              <Loader2 size={32} className="mx-auto animate-spin opacity-60" />
              <div className="text-sm mt-2">รอการอนุมัติก่อน จึงจะดู QR / ลิงก์ Zoom ได้</div>
            </div>
          ) : es === "Used" ? (
            <div className="bg-emerald-50 text-emerald-700 rounded-2xl p-5 text-center">
              <CheckCircle2 size={40} className="mx-auto" />
              <div className="mt-2 font-medium">เช็คอินแล้ว</div>
              <div className="text-xs">{thDateTime(b.checkedInAt)} · {b.checkinVia === "scan" ? "สแกน QR" : "เข้า Zoom"}</div>
            </div>
          ) : es === "Expired" ? (
            <div className="bg-rose-50 text-rose-600 rounded-2xl p-5 text-center">
              <AlertTriangle size={32} className="mx-auto" />
              <div className="text-sm mt-2">คลาสนี้สิ้นสุดเวลาแล้ว ไม่สามารถเช็คอินได้</div>
            </div>
          ) : !isOnline ? (
            // item 7 — Onsite: gen QR จาก bookingID
            <div className="bg-white rounded-2xl p-5 shadow-lg shadow-black/15 border border-slate-100 text-center">
              <div className="text-xs text-slate-400 mb-2">นำ QR นี้ไปสแกนที่หน้าห้องเรียน</div>
              <img src={`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${b.id}`} alt="qr" className="w-40 h-40 mx-auto rounded-xl" />
              <div className="text-[11px] text-slate-400 mt-2 font-mono">booking: {b.id}</div>
              <div className="mt-4 border-t border-slate-100 pt-3">
                <a href={cls.meeting_url} target="_blank" rel="noreferrer" className="text-sm text-sky-600 inline-flex items-center gap-1.5">
                  <Link2 size={15} /> ลิงก์ Zoom สำรอง
                </a>
                <div className="text-[11px] text-slate-400 mt-0.5">การกดลิงก์ไม่ถือเป็นการเช็คอิน — ต้องสแกน QR เท่านั้น</div>
              </div>
            </div>
          ) : (
            <div className="bg-white rounded-2xl p-5 shadow-lg shadow-black/15 border border-slate-100 text-center">
              <Video size={36} className="mx-auto text-sky-500" />
              {zoomOpen ? (
                <>
                  <div className="text-sm text-slate-500 mt-2">กดปุ่มเพื่อเข้าห้องเรียน (นับเป็นการเช็คอิน)</div>
                  <button onClick={() => { checkIn(b.id, "zoom"); window.open(cls.meeting_url, "_blank"); showToast("เข้าห้อง Zoom · เช็คอินแล้ว"); }}
                    className="mt-3 w-full text-white text-base font-semibold py-4 rounded-xl bg-sky-600 active:scale-[.98] transition" style={{ boxShadow: "0 10px 24px -8px rgba(0,0,0,.3)" }}>เข้าห้อง Zoom</button>
                </>
              ) : (
                <div className="text-sm text-slate-400 mt-2 leading-relaxed">ลิงก์ Zoom จะเปิดให้เข้า<br />ก่อนเริ่มเรียน 2 ชั่วโมง</div>
              )}
            </div>
          )}
        </div>
      </Shell>
    );
  }

  /* ===== ADMIN: SLIP APPROVAL ===== */
  if (view === "admin:slip") {
    const pending = payments.filter((p) => p.status === "Pending");
    return (
      <Shell>
        <TopBar title="อนุมัติสลิป" onBack={() => go("home")} />
        <div className="p-4 space-y-2.5">
          {pending.length === 0 && <Empty icon={FileCheck} text="ไม่มีสลิปรออนุมัติ" />}
          {pending.map((p) => {
            const u = users.find((x) => x.uid === p.uid);
            return (
              <div key={p.id} className="bg-white rounded-2xl p-4 shadow-lg shadow-black/15 border border-slate-100">
                <div className="flex justify-between items-start">
                  <div>
                    <div className="font-medium text-slate-800 text-sm">{u?.display_name}</div>
                    <div className="text-xs text-slate-400">{u?.uid} · บัตร {p.passName} · {PASSES[p.passName].price}฿</div>
                    <div className="text-[11px] text-slate-400 mt-0.5">ส่งเมื่อ {thDateTime(p.createdAt)}</div>
                  </div>
                  <span className="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">Pending</span>
                </div>
                {p.slip_url && (p.slip_url.startsWith("http") || p.slip_url.startsWith("data:")) && (
                  <img src={p.slip_url} alt="slip" className="mt-3 w-28 h-28 object-cover rounded-lg" />
                )}
                {rejecting === p.id ? (
                  <div className="mt-3 space-y-2">
                    <textarea value={rejectNote} onChange={(e) => setRejectNote(e.target.value)} rows={2}
                      placeholder="ระบุเหตุผลการปฏิเสธ (บันทึกใน rejected_note)"
                      className="w-full text-sm border border-slate-200 rounded-xl px-3 py-2 focus:outline-none focus:border-rose-300" />
                    <div className="flex gap-2">
                      <button onClick={confirmReject} className="flex-1 text-white text-sm font-medium py-2.5 rounded-xl bg-rose-600 active:scale-[.98] transition">ยืนยันปฏิเสธ</button>
                      <button onClick={() => { setRejecting(null); setRejectNote(""); }} className="flex-1 text-slate-600 text-sm font-medium py-2.5 rounded-xl bg-slate-100 active:scale-[.98] transition">ยกเลิก</button>
                    </div>
                  </div>
                ) : (
                  <div className="flex gap-2 mt-3">
                    <button onClick={() => approvePayment(p.id)} className="flex-1 text-white text-sm font-medium py-2.5 rounded-xl bg-emerald-600 flex items-center justify-center gap-1 active:scale-[.98] transition">
                      <CheckCircle2 size={16} /> อนุมัติ
                    </button>
                    <button onClick={() => { setRejecting(p.id); setRejectNote(""); }} className="flex-1 text-rose-600 text-sm font-medium py-2.5 rounded-xl bg-rose-50 flex items-center justify-center gap-1 active:scale-[.98] transition">
                      <XCircle size={16} /> ปฏิเสธ
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Shell>
    );
  }

  /* ===== ADMIN: SCAN — item 6 ===== */
  if (view === "admin:scan") {
    const rows = bookings
      .filter((b) => b.classId === nearest?.id)
      .map((b) => ({ ...b, cls: classes.find((c) => c.id === b.classId), u: users.find((x) => x.uid === b.uid) }));
    return (
      <Shell>
        <TopBar title="สแกนเข้าห้องเรียน" onBack={() => go("home")} />
        <div className="p-4 space-y-3">
          <button onClick={() => setScanOpen(true)}
            className="w-full bg-slate-900 rounded-2xl p-6 text-center text-white active:scale-[.99] transition">
            <Camera size={40} className="mx-auto text-orange-400" /><div className="text-sm mt-2 text-slate-200 font-medium">เปิดกล้องเพื่อสแกน QR</div>
            <div className="text-[11px] text-slate-500 mt-1">อัปเดต booking ของเจ้าของ QR อัตโนมัติ</div>
          </button>
          {scanOpen && <ScanCamera onDetect={handleScanDetect} onClose={() => setScanOpen(false)} />}
          <div className="text-xs font-medium text-slate-400 px-1">รายชื่อคนจอง · {nearest?.className || "-"}</div>
          {rows.map((b) => {
            const es = effStatus(b);
            const st = BOOK_STATUS_STYLE[es];
            return (
              <div key={b.id} className="bg-white rounded-2xl p-3.5 shadow-lg shadow-black/15 border border-slate-100 flex items-center gap-3">
                <img src={b.u?.photo_url} alt="" className="w-10 h-10 rounded-xl object-cover" />
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-slate-800 truncate">{b.u?.display_name}</div>
                  <div className="text-xs text-slate-400 truncate">{b.cls?.className} · {b.sessionType}</div>
                </div>
                {es === "Approved" ? (
                  <button onClick={() => { checkIn(b.id, "scan"); showToast(`เช็คอิน ${b.u?.display_name}`); }}
                    className="text-white text-xs px-3 py-2 rounded-lg flex items-center gap-1 shrink-0" style={{ background: BRAND }}>
                    <ScanLine size={14} /> เช็คอิน
                  </button>
                ) : (
                  <span className={`text-[11px] px-2 py-1 rounded-full shrink-0 ${st.cls}`}>{st.label}</span>
                )}
              </div>
            );
          })}
        </div>
      </Shell>
    );
  }

  /* ===== ADMIN: ATTENDANCE — item 5 ===== */
  if (view === "admin:attendance") {
    const perClass = classes.map((c) => {
      const bk = bookings.filter((b) => b.classId === c.id);
      return { cls: c, bk };
    }).sort((a, b) => b.cls.startTime - a.cls.startTime);

    const detailRows = attnDetail
      ? bookings.filter((b) => b.classId === attnDetail.classId && b.sessionType === attnDetail.session
          && (attnDetail.kind === "booked" || b.bookingStatus === "Used"))
          .map((b) => ({ ...b, u: users.find((x) => x.uid === b.uid) }))
      : [];

    const Num = ({ classId, session, kind, value, color }) => (
      <button onClick={() => setAttnDetail({ classId, session, kind })}
        className={`w-11 mx-auto block rounded-md py-1 text-center hover:ring-2 hover:ring-offset-1 transition ${color.bg}`}>
        <div className={`text-sm font-bold leading-tight ${color.text}`}>{value}</div>
      </button>
    );
    const activeCls = perClass.find((x) => x.cls.id === attnDetail?.classId)?.cls;

    return (
      <Shell>
        <TopBar title="ข้อมูลการเข้าเรียน" onBack={() => go("home")} />
        <div className="p-4">
          {perClass.length === 0 && <Empty icon={ClipboardList} text="ยังไม่มีข้อมูลการเข้าเรียน" />}
          {perClass.length > 0 && (
            <div className="bg-white rounded-xl shadow-lg shadow-black/15 border border-slate-100 overflow-hidden">
              <table className="w-full text-xs border-collapse">
                <thead>
                  <tr className="border-b border-slate-100">
                    <th rowSpan={2} className="text-left font-medium text-slate-500 align-bottom px-2 py-1.5">คลาส</th>
                    <th colSpan={2} className="text-center font-medium text-slate-500 py-1 border-l border-slate-100">
                      <span className="inline-flex items-center gap-0.5"><MapPin size={10} className="text-orange-500" />Onsite</span>
                    </th>
                    <th colSpan={2} className="text-center font-medium text-slate-500 py-1 border-l border-slate-100">
                      <span className="inline-flex items-center gap-0.5"><Video size={10} className="text-sky-500" />Online</span>
                    </th>
                  </tr>

function ClassForm({ cls, onSave, onCancel }) {
  const [f, setF] = useState({
    className: cls?.className || "",
    instructorName: cls?.instructorName || "",
    description: cls?.description || "",
    active: cls?.active ?? true,
    isFree: cls?.is_free_booking ?? false,
    class_url: cls?.class_url || "",
    capOnsite: cls?.sessions?.Onsite.capacity ?? 30,
    capOnline: cls?.sessions?.Online.capacity ?? 100,
    startLocal: toLocalInput(cls?.startTime || Date.now() + 24 * 3600 * 1000),
    endLocal: toLocalInput(cls?.endTime || Date.now() + 24 * 3600 * 1000 + 3 * 3600 * 1000),
    location: cls?.location || "",
    meeting_url: cls?.meeting_url || "",
  });
  const [err, setErr] = useState("");
  const [uploading, setUploading] = useState(false);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const handleClassImageFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(true);
    try {
      const url = await uploadFile(file, `cms_uploads/classes/${Date.now()}/${file.name}`);
      set("class_url", url);
    } catch (err) {
      setErr("อัปโหลดรูปไม่สำเร็จ");
    }
    setUploading(false);
  };
  const submit = () => {
    if (!f.className.trim()) return setErr("กรุณาระบุชื่อคลาส");
    if (fromLocalInput(f.endLocal) <= fromLocalInput(f.startLocal)) return setErr("เวลาสิ้นสุดต้องหลังเวลาเริ่ม");
    onSave({
      className: f.className.trim(), instructorName: f.instructorName.trim(), description: f.description.trim(),
      active: f.active, isFree: f.isFree, class_url: f.class_url.trim(),
      capOnsite: Number(f.capOnsite) || 0, capOnline: Number(f.capOnline) || 0,
      startTime: fromLocalInput(f.startLocal), endTime: fromLocalInput(f.endLocal),
      location: f.location.trim(), meeting_url: f.meeting_url.trim(),
    });
  };
  const L = ({ label, children }) => (
    <div><div className="text-[11px] text-slate-400 mb-1">{label}</div>{children}</div>
  );
  const inputCls = "w-full text-sm border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:border-orange-300";
  return (
    <div className="p-4 space-y-3.5">
      <L label="Classname"><input value={f.className} onChange={(e) => set("className", e.target.value)} className={inputCls} placeholder="เช่น BIZ101" /></L>
      <L label="InstructorName"><input value={f.instructorName} onChange={(e) => set("instructorName", e.target.value)} className={inputCls} /></L>
      <L label="Description"><textarea value={f.description} onChange={(e) => set("description", e.target.value)} rows={3} className={inputCls} /></L>

      <div className="flex gap-4 bg-white rounded-xl border border-slate-100 px-4 py-3">
        <label className="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
          <input type="checkbox" checked={f.active} onChange={(e) => set("active", e.target.checked)} className="w-4 h-4 accent-orange-500" /> Active
        </label>
        <label className="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
          <input type="checkbox" checked={f.isFree} onChange={(e) => set("isFree", e.target.checked)} className="w-4 h-4 accent-orange-500" /> Class free
        </label>
      </div>

      <div className="bg-white rounded-xl border border-slate-100 p-3">
        <span className="text-sm text-slate-600">Class Picture</span>
        <div className="mt-2 flex items-start gap-3">
          <label className="relative shrink-0 cursor-pointer group">
            <input type="file" accept="image/*" className="hidden" onChange={handleClassImageFile} />
            {f.class_url
              ? <img src={f.class_url} alt="" className="w-24 aspect-[3/4] rounded-lg object-cover" />
              : <div className="w-24 aspect-[3/4] rounded-lg bg-orange-50 grid place-items-center text-orange-400"><Upload size={18} /></div>}
            <div className={`absolute inset-0 rounded-lg bg-black/50 transition grid place-items-center text-white text-[10px] text-center px-1 ${uploading ? "opacity-100" : "opacity-0 group-hover:opacity-100"}`}>
              {uploading ? "กำลังอัปโหลด…" : f.class_url ? "แตะเพื่อเปลี่ยนรูป" : "แตะเพื่ออัปโหลด"}
            </div>
          </label>
          <div className="flex-1 space-y-1.5">
            <input value={f.class_url} onChange={(e) => set("class_url", e.target.value)} placeholder="หรือวาง URL รูป" className="w-full text-xs border border-slate-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-orange-300" />
            <div className="text-[10px] text-slate-400">แตะรูปเพื่ออัปโหลดไฟล์ หรือวาง URL รูปด้านบน</div>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <L label="Capacity Onsite"><input type="number" min="0" value={f.capOnsite} onChange={(e) => set("capOnsite", e.target.value)} className={inputCls} /></L>
        <L label="Capacity Online"><input type="number" min="0" value={f.capOnline} onChange={(e) => set("capOnline", e.target.value)} className={inputCls} /></L>
      </div>

      <L label="StartTime"><input type="datetime-local" value={f.startLocal} onChange={(e) => set("startLocal", e.target.value)} className={inputCls} /></L>
      <L label="EndTime"><input type="datetime-local" value={f.endLocal} onChange={(e) => set("endLocal", e.target.value)} className={inputCls} /></L>
      <L label="Location"><input value={f.location} onChange={(e) => set("location", e.target.value)} className={inputCls} /></L>
      <L label="MeetingURL"><input value={f.meeting_url} onChange={(e) => set("meeting_url", e.target.value)} className={inputCls} placeholder="https://us02web.zoom.us/j/..." /></L>

      {err && <div className="text-xs text-rose-500">{err}</div>}
      <div className="flex gap-2 pt-1">
        <button onClick={submit} className="flex-1 text-white text-base font-semibold py-3.5 rounded-xl active:scale-[.98] transition" style={{ background: BRAND, boxShadow: "0 10px 24px -8px rgba(0,0,0,.35)" }}>Confirm</button>
        <button onClick={onCancel} className="px-5 text-slate-600 text-base font-medium py-3.5 rounded-xl bg-slate-100 active:scale-[.98] transition">ยกเลิก</button>
      </div>
    </div>
  );
}

/* ---------- Login ---------- */
function mapAuthError(e) {
  const code = e?.code || "";
  if (code.includes("wrong-password") || code.includes("invalid-credential") || code.includes("invalid-login-credentials")) return "อีเมลหรือรหัสผ่านไม่ถูกต้อง";
  if (code.includes("user-not-found")) return "ไม่พบบัญชีนี้ในระบบ";
  if (code.includes("too-many-requests")) return "ลองผิดหลายครั้งเกินไป กรุณาลองใหม่ภายหลัง";
  if (code.includes("email-already-in-use")) return "อีเมลนี้มีบัญชีอยู่แล้ว";
  if (code.includes("weak-password")) return "รหัสผ่านสั้นเกินไป (อย่างน้อย 6 ตัวอักษร)";
  if (code.includes("invalid-email")) return "รูปแบบอีเมลไม่ถูกต้อง";
  return e?.message || "เกิดข้อผิดพลาด กรุณาลองใหม่";
}

function Login() {
  const [mode, setMode] = useState("signin"); // signin | forgot | register
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [err, setErr] = useState("");
  const [info, setInfo] = useState("");
  const [busy, setBusy] = useState(false);

  const switchMode = (m) => { setMode(m); setErr(""); setInfo(""); };

  const submit = async () => {
    setErr(""); setInfo("");
    if (!email.trim()) return setErr("กรุณากรอกอีเมล");
    setBusy(true);
    try {
      if (mode === "signin") {
        await auth.signInWithEmailAndPassword(email.trim(), password);
      } else if (mode === "forgot") {
        await auth.sendPasswordResetEmail(email.trim());
        setInfo("ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลแล้ว");
      } else if (mode === "register") {
        const cred = await auth.createUserWithEmailAndPassword(email.trim(), password);
        await db.collection("users").doc(cred.user.uid).set({
          display_name: name.trim() || email.trim(),
          email: email.trim(),
          phone_number: "",
          role: "Guest",
          memberStatus: "Guest",
          photo_url: "",
          line: "",
          created_time: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
    } catch (e) {
      setErr(mapAuthError(e));
    }
    setBusy(false);
  };

  return (
    <div className="min-h-screen bg-slate-50 flex justify-center">
      <div className="w-full max-w-[440px] px-6 flex flex-col justify-center">
        <div className="text-center mb-8">
          <OwnerLogo className="w-20 h-20 mx-auto" />
          <h1 className="text-2xl font-bold text-slate-800 mt-3">The Owner Class</h1>
          <p className="text-sm text-slate-400">
            {mode === "signin" ? "เข้าสู่ระบบด้วยอีเมล" : mode === "forgot" ? "รีเซ็ตรหัสผ่าน" : "ลงทะเบียนสมาชิกใหม่"}
          </p>
        </div>
        {mode === "register" && (
          <input value={name} onChange={(e) => setName(e.target.value)} placeholder="ชื่อ-นามสกุล"
            className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3.5 text-base mb-3 focus:outline-none focus:border-orange-300" />
        )}
        <input value={email} onChange={(e) => { setEmail(e.target.value); setErr(""); }}
          onKeyDown={(e) => e.key === "Enter" && submit()} placeholder="อีเมล" type="email"
          className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3.5 text-base focus:outline-none focus:border-orange-300" />
        {mode !== "forgot" && (
          <div className="relative mt-3">
            <input value={password} onChange={(e) => { setPassword(e.target.value); setErr(""); }}
              onKeyDown={(e) => e.key === "Enter" && submit()} placeholder="รหัสผ่าน" type={showPw ? "text" : "password"}
              className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3.5 pr-11 text-base focus:outline-none focus:border-orange-300" />
            <button type="button" onClick={() => setShowPw((v) => !v)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
              {showPw ? <EyeOff size={18} /> : <Eye size={18} />}
            </button>
          </div>
        )}
        {mode === "signin" && (
          <button type="button" onClick={() => switchMode("forgot")} className="mt-2 self-end text-xs" style={{ color: BRAND }}>ลืมรหัสผ่าน?</button>
        )}
        {err && <div className="text-xs text-rose-500 mt-1.5">{err}</div>}
        {info && <div className="text-xs text-emerald-600 mt-1.5">{info}</div>}
        <button onClick={submit} disabled={busy}
          className="mt-3 w-full text-white text-base font-semibold py-4 rounded-xl active:scale-[.98] transition disabled:opacity-60"
          style={{ background: BRAND, boxShadow: "0 10px 24px -8px rgba(0,0,0,.35)" }}>
          {busy ? "กำลังดำเนินการ…" : mode === "signin" ? "ลงชื่อ" : mode === "forgot" ? "ส่งลิงก์รีเซ็ต" : "ลงทะเบียน"}
        </button>
        <div className="mt-4 text-center text-xs text-slate-400">
          {mode === "signin" && (
            <>หากยังไม่มีบัญชี? <button onClick={() => switchMode("register")} className="font-medium" style={{ color: BRAND }}>โปรดลงทะเบียน</button></>
          )}
          {mode !== "signin" && (
            <button onClick={() => switchMode("signin")} className="font-medium" style={{ color: BRAND }}>กลับไปเข้าสู่ระบบ</button>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
